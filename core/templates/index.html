<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Smart Woyofal – SENELEC</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root {
            --primary: #00b3a4;
            --secondary: #0078a8;
            --accent: #f7941d;
            --bg: #f2f2f2;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            background: linear-gradient(135deg, var(--secondary), var(--primary));
        }

        /* LEFT IMAGE */
        .left {
            width: 50%;
            background: url("Woyofal.jpg")
                        center/cover no-repeat;
        }

        /* RIGHT FORM */
        .right {
            width: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: var(--white);
            width: 420px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            color: var(--secondary);
            margin-bottom: 10px;
        }

        p {
            text-align: center;
            font-size: 14px;
            color: #555;
        }

        label {
            font-size: 14px;
            margin-top: 15px;
            display: block;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background: var(--accent);
            color: white;
            border: none;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #e68310;
        }

        #loader {
            text-align: center;
            margin-top: 10px;
            color: var(--secondary);
            display: none;
        }

        #result {
            margin-top: 20px;
            text-align: center;
        }

        #result img {
            margin-top: 10px;
            width: 180px;
        }

        /* RESPONSIVE */
        @media (max-width: 900px) {
            body {
                flex-direction: column;
            }
            .left {
                display: none;
            }
            .right {
                width: 100%;
            }
            .card {
                width: 90%;
            }
        }
    </style>
</head>
<body>

    <div class="left"></div>

    <div class="right">
        <div class="card">
            <h2>Smart Woyofal</h2>
            <p>Recharge intelligente – SENELEC</p>

            <label>Type d’utilisateur</label>
            <select id="role">
                <option value="client">Client</option>
                <option value="agent">Agent SENELEC</option>
            </select>

            <label>Numéro de compteur</label>
            <input type="text" id="meter_id" placeholder="Ex: 1441175316">

            <label>Quantité (kWh)</label>
            <input type="number" id="amount_kwh" placeholder="Ex: 10">

<button onclick="recharge()">Recharger</button>

            <div id="loader">⏳ Traitement en cours...</div>

            <div id="result"></div>
        </div>
    </div>

{% csrf_token %}

  <script>
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== "") {
        const cookies = document.cookie.split(";");
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + "=")) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

async function recharge() {

    const meterId = document.getElementById("meter_id").value;
    const amountKwh = document.getElementById("amount_kwh").value;

    const csrftoken = getCookie("csrftoken");

    try {
        const response = await fetch("/api/recharge/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": csrftoken
            },
            body: JSON.stringify({
                meter_id: meterId,
                amount_kwh: amountKwh
            })
        });

        const data = await response.json();

        if (!response.ok) {
            alert("Erreur: " + JSON.stringify(data));
            return;
        }

        document.getElementById("result").innerHTML =
            "Token : " + data.token;

    } catch (error) {
        alert("Erreur connexion serveur");
        console.error(error);
    }
}
</script>



</body>
</html>
